<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGOFans</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <header>
        <nav class="nav"> 
            <div class="logo">LEGO<span>Fans</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="producten.html">Sets</a></li>
                <li><a href="cart.html">Shopping Cart</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="cta">
                <img class="cta-img" src="headerFoto.webp" alt="header foto">
                <h1 class="cta-h1">Welkom bij LEGO Fans!</h1>
                <button class="cta-button">Nu Shoppen</button>
    </section>
<hr class="hr">
    <main id="producten" class="producten-container">
        <h2 class="h2">Toys & Games</h2>
        
        <section class="producten-grid">
            <article class="product-card">
                <img class="product-image" src="Baroque.webp" alt="Baroque">
                <h3>Trevi Fountain</h3>
                <p>€159.99</p>
                <button class="product-button" onclick="addToCart('Trevi Fountain', 159.99)">In winkelwagen</button>
            </article>

            <article class="product-card">
                <img class="product-image" src="Gardering.webp" alt="Gardering">
                <h3>Himeji Castle</h3>
                <p>€159.99</p>
                <button class="product-button" onclick="addToCart('Himeji Castle', 159.99)">In winkelwagen</button>
            </article>
        
            <article class="product-card">
                <img class="product-image" src="Geschiedenisliefhebbers.webp" alt="Geschiedenis">
                <h3>Neuschwanstein Castle</h3>
                <p>€269.99</p>
                <button class="product-button" onclick="addToCart('Neuschwanstein Castle', 269.99)">In winkelwagen</button>
            </article>

            <article class="product-card">
                <img class="product-image" src="LordRings.webp" alt="Lord of the Rings">
                <h3>Barad-dûr</h3>
                <p>€459.99</p>
                <button class="product-button" onclick="addToCart('Barad-dûr', 459.99)">In winkelwagen</button>
            </article>

            <article class="product-card">
                <img class="product-image" src="NoteDameParis.webp" alt="Note Dame Paris">
                <h3>Notre-Dame de Paris</h3>
                <p>€194.99</p>
                <button class="product-button" onclick="addToCart('Notre-Dame de Paris', 194.99)">In winkelwagen</button>
            </article>

            <article class="product-card">
                <img class="product-image" src="StatueOfLiberty.webp" alt="Statue of Liberty">
                <h3>Statue of Liberty</h3>
                <p>€99.99</p>
                <button class="product-button" onclick="addToCart('Statue of Liberty', 99.99)">In winkelwagen</button>
            </article>
            

    </main>

    <footer>
        <p>&copy; 2026 LEGO Webshop Project - Gebouwd door Anna-Maria</p>
    </footer>   

    <script src="script.js"></script>
</body>
</html>
